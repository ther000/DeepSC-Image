device: auto
dataset:
  name: image_folder
  root: datasets/kodak
  image_size: 256
model:
  semantic_channels: 32
  base_channels: 32
checkpoint: null
channel:
  type: rayleigh
  snr_db: [-5, 0, 5, 10, 15, 20]
baseline:
  jpeg_quality: 90
evaluation:
  # Repeated stochastic channel draws per image/SNR for Monte Carlo averaging.
  monte_carlo_samples: 5
  artifacts:
    plot_curves: true
output_dir: outputs/eval_kodak
