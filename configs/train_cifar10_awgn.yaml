seed: 42
device: auto
dataset:
  name: cifar10
  root: datasets/cifar10
  image_size: 32
  download: false
model:
  # Compression-rate sweep example: a list runs one output subdirectory per value.
  semantic_channels: [16, 32, 64]
  base_channels: 32
channel:
  type: awgn
  train_snr_db: [0, 5, 10, 15, 20]
training:
  epochs: 100
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  ssim_weight: 0.2
  amp:
    enabled: false
    dtype: float16
  dataloader:
    num_workers: 0
    pin_memory: false
    persistent_workers: false
    prefetch_factor: null
  artifacts:
    history_every_epochs: 1
    plot_every_epochs: 1
    checkpoint_every_epochs: 1
  output_dir: outputs/train_cifar10_awgn
