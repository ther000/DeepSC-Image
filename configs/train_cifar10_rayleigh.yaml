seed: 42
device: auto
dataset:
  name: cifar10
  root: datasets/cifar10
  image_size: 32
  download: false
model:
  # Compression-rate sweep example: a list runs one output subdirectory per value.
  semantic_channels: [16, 32, 64]
  base_channels: 32
channel:
  type: rayleigh
  train_snr_db: [0, 5, 10, 15, 20]
training:
  epochs: 100
  batch_size: 64
  learning_rate: 0.001
  weight_decay: 0.0001
  ssim_weight: 0.2
  output_dir: outputs/train_cifar10_rayleigh
